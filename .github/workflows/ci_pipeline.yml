name: Validador do Banco de Dados de Radioamadorismo

# Define quando o robô vai agir (Sempre que houver alteração no código)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  auditoria_de_dados:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Baixar o repositório (Junta o Python e o JSON)
      uses: actions/checkout@v4

    - name: 🐍 Preparar o ambiente Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' 

    - name: 📦 Instalar dependências (O validador JSON ISO)
      run: |
        python -m pip install --upgrade pip
        pip install jsonschema rfc3339-validator strict-rfc3339

    - name: 🚀 Executar a Auditoria (Imunidade do Sistema)
      # O script vai ler o arquivo JSON e barrar se houver falha matemática ou de Anatel
      run: |
        python validador.py repetidoras.json
